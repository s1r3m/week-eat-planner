    <line x1="125" y1="160" x2="325" y2="160"></line>
    <line x1="125" y1="200" x2="325" y2="200"></line>

    <line x1="175" y1="105" x2="175" y2="230"></line>
    <line x1="225" y1="105" x2="225" y2="230"></line>
    <line x1="275" y1="105" x2="275" y2="230"></line>
  </g>
</svg>
