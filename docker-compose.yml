services:
  db:
    image: postgres:13
    container_name: wep-db-dev
    environment:
      - POSTGRES_DB=wep
      - POSTGRES_USER=wep
      - POSTGRES_PASSWORD=wep
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wep -d wep"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
