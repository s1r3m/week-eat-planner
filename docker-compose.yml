services:
  db:
    image: postgres:13
    container_name: wep-db
    environment:
      - POSTGRES_DB=wep
      - POSTGRES_USER=wep
      - POSTGRES_PASSWORD=wep
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wep -d wep"]
      interval: 5s
      timeout: 5s
      retries: 5

  fe:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wep-fe
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: yarn dev --port 3000 --host 0.0.0.0

  minio:
    image: quay.io/minio/minio
    container_name: wep-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: wep_root
      MINIO_ROOT_PASSWORD: weppassword
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 wep_root weppassword;
      mc mb -p local/recipes;
      mc mb -p local/weeks;
      mc mb -p local/users;
      mc anonymous set public local/recipes;
      mc anonymous set public local/weeks;
      mc anonymous set public local/users;
      exit 0;
      "

volumes:
  minio_data:
  postgres_data_dev:
