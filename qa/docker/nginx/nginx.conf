worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Helpful variable for websocket / upgrade support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstreams — these names should match the service names in your docker-compose
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # Redirect bare /api -> /api/ for consistency
        location = /api {
            return 301 /api/;
        }

        # API: proxy and strip the /api/ prefix
        # Using a proxy_pass with a trailing slash replaces the matching prefix
        # so /api/ping -> forwarded to backend as /ping
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_redirect off;
        }

        # All other requests -> frontend (dev server or static frontend container)
        # In dev (vite) the frontend will handle SPA fallback; in prod the frontend
        # container should serve static files and also handle SPA fallback.
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_http_version 1.1;
            proxy_redirect off;
        }
    }
}