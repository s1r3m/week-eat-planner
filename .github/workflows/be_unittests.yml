name: BE Unittests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  be_unittests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Fetch all history for all branches and tags to enable merging.
        fetch-depth: 0

    - name: Merge base branch into PR
      if: github.event_name == 'pull_request'
      run: |
        echo "Merging base branch (origin/${{ github.event.pull_request.base.ref }}) into HEAD..."
        git merge "origin/${{ github.event.pull_request.base.ref }}"
        echo "Merge successful."
      # This step will automatically fail if there are merge conflicts,
      # correctly indicating that the PR is not ready.

    - name: Install dependencies
      run: |
        make install

    - name: Setup .env file
      run: |
        make be_tests_config

    - name: Run the env
      run: |
        make migrations

    - name: Run tests
      run: |
        make be_test

    - name: Stop the DB and clean up
      # This step will run even if the tests fail, ensuring Docker containers are stopped.
      if: always()
      run: make stop